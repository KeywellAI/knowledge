<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Keywell Knowledge Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Work+Sans:ital,wght@0,100..900;1,100..900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
<style>
/* ── Design Tokens (Keywell.ai Design System) ─────────────────────────────── */
:root {
  --color-ink:           #111111;
  --color-ink-soft:      #44546A;
  --color-orange:        #ED7D31;
  --color-orange-light:  #F5A66A;
  --color-orange-pale:   #FEF0E6;
  --color-navy:          #2E3191;
  --color-navy-pale:     #EAEBF7;
  --color-teal:          #1B6C6C;
  --color-teal-pale:     #E4F2F2;
  --color-coral:         #E87C74;
  --color-white:         #FFFFFF;
  --color-gray-50:       #F9F9F9;
  --color-gray-100:      #F2F2F2;
  --color-gray-200:      #E5E5E5;
  --color-gray-300:      #CCCCCC;
  --color-gray-400:      #999999;
  --color-gray-500:      #666666;
  --color-text-primary:  var(--color-ink);
  --color-text-secondary:var(--color-ink-soft);
  --color-text-muted:    var(--color-gray-400);
  --color-border:        var(--color-gray-200);
  --color-bg:            var(--color-white);
  --color-bg-subtle:     var(--color-gray-50);

  --font-display: 'Josefin Sans', system-ui, sans-serif;
  --font-body:    'Work Sans', system-ui, sans-serif;
  --font-callout: 'Open Sans', var(--font-body);
  --font-mono:    'DM Mono', 'Courier New', monospace;

  --text-xs:   0.75rem;
  --text-sm:   0.875rem;
  --text-base: 1rem;
  --text-md:   1.125rem;
  --text-lg:   1.25rem;
  --text-xl:   1.5rem;
  --text-2xl:  1.875rem;
  --text-3xl:  2.25rem;
  --text-4xl:  3rem;

  --weight-light:    300;
  --weight-regular:  400;
  --weight-medium:   500;
  --weight-semibold: 600;
  --weight-bold:     700;

  --leading-tight:   1.15;
  --leading-snug:    1.3;
  --leading-normal:  1.5;
  --leading-relaxed: 1.65;

  --tracking-tight:   -0.03em;
  --tracking-snug:    -0.02em;
  --tracking-normal:   0;
  --tracking-wide:     0.04em;
  --tracking-wider:    0.08em;
  --tracking-widest:   0.15em;

  --space-1:  0.25rem;
  --space-2:  0.5rem;
  --space-3:  0.75rem;
  --space-4:  1rem;
  --space-5:  1.25rem;
  --space-6:  1.5rem;
  --space-8:  2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;

  --radius-none: 0px;
  --radius-sm:   2px;
  --radius-md:   4px;
  --radius-lg:   6px;
  --radius-xl:   8px;
  --radius-pill: 999px;

  --shadow-xs: 0 1px 2px rgba(17,17,17,0.06);
  --shadow-sm: 0 1px 4px rgba(17,17,17,0.08), 0 0 1px rgba(17,17,17,0.04);
  --shadow-md: 0 4px 12px rgba(17,17,17,0.08), 0 1px 3px rgba(17,17,17,0.05);

  --ease-default:     cubic-bezier(0.25, 0.1, 0.25, 1);
  --transition-base:  200ms var(--ease-default);
  --transition-fast:  150ms var(--ease-default);
}

/* ── Reset ───────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--color-text-primary);
  background: var(--color-bg);
  overflow: hidden;
}

/* ── Layout ──────────────────────────────────────────────────────────────── */
.layout { display: flex; height: 100vh; }

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
.sidebar {
  width: 256px;
  min-width: 256px;
  background: var(--color-ink);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  border-right: 1px solid rgba(255,255,255,0.06);
}

.sidebar-logo {
  padding: var(--space-5) var(--space-6);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  gap: var(--space-3);
  flex-shrink: 0;
}

.logo-mark {
  width: 30px;
  height: 30px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-mark svg { width: 30px; height: 30px; }

.logo-text {
  font-family: var(--font-display);
  font-size: var(--text-sm);
  font-weight: var(--weight-semibold);
  color: var(--color-white);
  letter-spacing: 0.02em;
  line-height: 1.2;
}

.logo-sub {
  font-family: var(--font-body);
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  letter-spacing: var(--tracking-wider);
  text-transform: uppercase;
  margin-top: 2px;
}

.sidebar-nav {
  flex: 1;
  padding: var(--space-4) 0 var(--space-8);
  overflow-y: auto;
}

.nav-home {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-5);
  margin: 0 0 var(--space-3);
  font-family: var(--font-body);
  font-size: var(--text-sm);
  font-weight: var(--weight-medium);
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: color var(--transition-fast), background var(--transition-fast);
}

.nav-home:hover {
  color: var(--color-white);
  background: rgba(255,255,255,0.05);
}

.nav-home.active {
  color: var(--color-white);
  border-left-color: var(--color-orange);
  background: rgba(237,125,49,0.08);
}

.nav-home svg {
  width: 14px;
  height: 14px;
  opacity: 0.5;
  flex-shrink: 0;
}

.nav-home.active svg { opacity: 0.8; }

.nav-section { margin-bottom: var(--space-1); }

.nav-section-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-3) var(--space-5) var(--space-1);
  cursor: pointer;
  user-select: none;
}

.nav-section-toggle:hover .nav-section-label { color: rgba(255,255,255,0.5); }

.nav-section-label {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: var(--weight-semibold);
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
  color: rgba(255,255,255,0.28);
  transition: color var(--transition-fast);
}

.nav-section-chevron {
  width: 12px;
  height: 12px;
  color: rgba(255,255,255,0.2);
  transition: transform var(--transition-base);
  flex-shrink: 0;
}

.nav-section.open .nav-section-chevron { transform: rotate(90deg); }

.nav-items { display: none; padding-bottom: var(--space-2); }
.nav-section.open .nav-items { display: block; }

.nav-sub-label {
  padding: var(--space-2) var(--space-5) var(--space-1) calc(var(--space-5) + var(--space-5));
  font-family: var(--font-display);
  font-size: 9px;
  font-weight: var(--weight-semibold);
  letter-spacing: var(--tracking-wider);
  text-transform: uppercase;
  color: rgba(255,255,255,0.18);
}

.nav-item {
  display: block;
  padding: 7px var(--space-5) 7px calc(var(--space-5) + var(--space-5));
  font-family: var(--font-body);
  font-size: var(--text-sm);
  line-height: var(--leading-normal);
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: color var(--transition-fast), background var(--transition-fast);
}

.nav-item:hover {
  color: rgba(255,255,255,0.8);
  background: rgba(255,255,255,0.04);
}

.nav-item.active {
  color: var(--color-white);
  border-left-color: var(--color-orange);
  background: rgba(237,125,49,0.08);
}

.nav-item.empty {
  opacity: 0.28;
  font-style: italic;
  cursor: default;
  font-size: var(--text-xs);
}

.nav-item.empty:hover { background: none; }

/* ── Content Area ────────────────────────────────────────────────────────── */
.content-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  background: var(--color-white);
}

/* ── Doc Header ──────────────────────────────────────────────────────────── */
.doc-header {
  padding: var(--space-10) var(--space-12) var(--space-8);
  border-bottom: 1px solid var(--color-border);
  flex-shrink: 0;
}

.doc-breadcrumb {
  font-family: var(--font-display);
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  letter-spacing: var(--tracking-wider);
  text-transform: uppercase;
  color: var(--color-orange);
  margin-bottom: var(--space-3);
}

.doc-title {
  font-family: var(--font-display);
  font-size: var(--text-4xl);
  font-weight: var(--weight-medium);
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-snug);
  color: var(--color-text-primary);
}

.doc-meta-row {
  display: flex;
  gap: var(--space-8);
  margin-top: var(--space-4);
  flex-wrap: wrap;
}

.doc-meta-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.doc-meta-label {
  font-family: var(--font-display);
  font-size: 9px;
  font-weight: var(--weight-semibold);
  letter-spacing: var(--tracking-wider);
  text-transform: uppercase;
  color: var(--color-text-muted);
}

.doc-meta-value {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  color: var(--color-text-secondary);
}

/* ── Doc Body ────────────────────────────────────────────────────────────── */
.doc-body {
  padding: var(--space-10) var(--space-12) var(--space-16);
  max-width: 880px;
}

.doc-body > *:first-child { margin-top: 0; }

.doc-body h1 {
  font-family: var(--font-display);
  font-size: var(--text-4xl);
  font-weight: var(--weight-medium);
  line-height: var(--leading-snug);
  letter-spacing: var(--tracking-snug);
  color: var(--color-text-primary);
  margin-top: var(--space-12);
  margin-bottom: var(--space-5);
}

.doc-body h2 {
  font-family: var(--font-display);
  font-size: var(--text-2xl);
  font-weight: var(--weight-medium);
  line-height: var(--leading-snug);
  letter-spacing: var(--tracking-snug);
  color: var(--color-text-primary);
  margin-top: var(--space-10);
  margin-bottom: var(--space-4);
  padding-bottom: var(--space-3);
  border-bottom: 1px solid var(--color-border);
}

.doc-body h3 {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: var(--weight-medium);
  line-height: var(--leading-snug);
  color: var(--color-text-primary);
  margin-top: var(--space-8);
  margin-bottom: var(--space-3);
}

.doc-body h4 {
  font-family: var(--font-display);
  font-size: var(--text-lg);
  font-weight: var(--weight-semibold);
  line-height: var(--leading-normal);
  color: var(--color-text-primary);
  margin-top: var(--space-6);
  margin-bottom: var(--space-2);
}

.doc-body p {
  font-family: var(--font-body);
  font-size: var(--text-base);
  font-weight: var(--weight-regular);
  line-height: var(--leading-relaxed);
  color: var(--color-text-primary);
  margin-bottom: var(--space-4);
}

.doc-body a {
  color: var(--color-navy);
  text-decoration: underline;
  text-underline-offset: 2px;
  text-decoration-color: rgba(46,49,145,0.3);
  transition: color var(--transition-fast), text-decoration-color var(--transition-fast);
}

.doc-body a:hover {
  color: var(--color-orange);
  text-decoration-color: var(--color-orange);
}

.doc-body ul,
.doc-body ol {
  font-family: var(--font-body);
  font-size: var(--text-base);
  line-height: var(--leading-relaxed);
  color: var(--color-text-primary);
  margin-bottom: var(--space-4);
  padding-left: var(--space-6);
}

.doc-body li { margin-bottom: var(--space-2); }

.doc-body li::marker { color: var(--color-orange); }

.doc-body li p { margin-bottom: 0; }

.doc-body strong {
  font-weight: var(--weight-semibold);
  color: var(--color-ink);
}

.doc-body em {
  font-style: italic;
  color: var(--color-text-secondary);
}

.doc-body code {
  font-family: var(--font-mono);
  font-size: 0.875em;
  background: var(--color-gray-100);
  color: var(--color-ink);
  padding: 0.1em 0.35em;
  border-radius: var(--radius-sm);
}

.doc-body pre {
  background: var(--color-gray-50);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-6);
  overflow-x: auto;
  margin-bottom: var(--space-6);
}

.doc-body pre code {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  background: none;
  padding: 0;
  border-radius: 0;
  line-height: 1.65;
  color: var(--color-ink);
}

.doc-body blockquote {
  border-left: 3px solid var(--color-orange);
  padding: var(--space-4) var(--space-6);
  margin: var(--space-6) 0;
  background: var(--color-gray-50);
  border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
}

.doc-body blockquote p {
  font-family: var(--font-callout);
  font-size: var(--text-md);
  font-weight: var(--weight-light);
  line-height: var(--leading-snug);
  color: var(--color-text-primary);
  margin: 0;
}

.doc-body blockquote p + p { margin-top: var(--space-3); }

.doc-body hr {
  border: none;
  border-top: 1px solid var(--color-border);
  margin: var(--space-10) 0;
}

/* ── Tables ──────────────────────────────────────────────────────────────── */
.doc-body table {
  width: 100%;
  border-collapse: collapse;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: var(--space-8);
  font-family: var(--font-body);
  font-size: var(--text-sm);
  box-shadow: var(--shadow-xs);
}

.doc-body thead { background: var(--color-gray-50); }

.doc-body th {
  font-family: var(--font-display);
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  letter-spacing: var(--tracking-wide);
  text-transform: uppercase;
  color: var(--color-text-secondary);
  padding: var(--space-3) var(--space-4);
  text-align: left;
  border-bottom: 1px solid var(--color-border);
  white-space: nowrap;
}

.doc-body td {
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--color-border);
  color: var(--color-text-primary);
  line-height: var(--leading-normal);
  vertical-align: top;
}

.doc-body tr:last-child td { border-bottom: none; }

.doc-body tbody tr:hover td { background: var(--color-gray-50); }

/* ── Empty / placeholder states ──────────────────────────────────────────── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  padding: var(--space-16);
  text-align: center;
  color: var(--color-text-muted);
}

.empty-state-icon {
  width: 48px;
  height: 48px;
  color: var(--color-gray-300);
  margin-bottom: var(--space-6);
}

.empty-state h2 {
  font-family: var(--font-display);
  font-size: var(--text-2xl);
  font-weight: var(--weight-medium);
  color: var(--color-text-secondary);
  margin-bottom: var(--space-3);
  border: none;
  padding: 0;
}

.empty-state p {
  font-size: var(--text-base);
  color: var(--color-text-muted);
  max-width: 400px;
}

/* ── Scrollbars ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--color-gray-300); border-radius: var(--radius-pill); }
::-webkit-scrollbar-thumb:hover { background: var(--color-gray-400); }
</style>
</head>
<body>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <div class="sidebar-logo">
      <div class="logo-mark">
        <!-- Keywell icon mark — geometric W triangle -->
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="40" height="40" rx="4" fill="#ED7D31"/>
          <!-- W shape in white -->

          <path d="M2 6.5L8 2L14 6.5V14H10V10H6V14H2V6.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>

      <!-- Product -->
      <div class="nav-section" id="section-product">

          </svg>
        </div>
        <div class="nav-items">
          <div class="nav-item empty">No docs yet</div>
        </div>
      </div>

      <!-- Operations -->
      <div class="nav-section" id="section-operations">
        <div class="nav-section-toggle" onclick="toggleSection('operations')">
          <span class="nav-section-label">Operations</span>
          <svg class="nav-section-chevron" viewBox="0 0 12 12" fill="none">
            <path d="M4.5 3L7.5 6L4.5 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="nav-items">
          <div class="nav-item empty">No docs yet</div>
        </div>
      </div>

      <!-- Research -->
      <div class="nav-section" id="section-research">
        <div class="nav-section-toggle" onclick="toggleSection('research')">
          <span class="nav-section-label">Research</span>
          <svg class="nav-section-chevron" viewBox="0 0 12 12" fill="none">

          </svg>
        </div>
        <div class="nav-items">
          <div class="nav-item empty">No docs yet</div>
        </div>
      </div>

    </nav>
  </aside>

  <!-- ── Content ── -->
  <div class="content-area" id="content-area"></div>

</div>

<script>
// ── Content store ─────────────────────────────────────────────────────────────
const PAGES = {};

PAGES[''] = `# Keywell Knowledge Store

The source of truth for Keywell's internal knowledge. Everything here should be written to stay useful over time: decisions, processes, standards, and context that new and existing team members need.

---

## File Structure

\`\`\`
knowledge/
├── product/                  ← Product decisions, roadmap context, feature specs
│   ├── decisions/            ← ADRs and key product calls with rationale
│   └── features/             ← Per-feature specs and requirements docs
│
├── engineering/              ← Technical standards, architecture, and how-tos
│   ├── architecture/         ← System design docs, data models, integrations
│   ├── standards/            ← Coding conventions, PR process, branching strategy

## What Goes Where

## Conventions

- **File format**: Markdown (\`.md\`) for all docs.
- **File names**: lowercase with hyphens — e.g., \`claims-data-source.md\`, \`pr-process.md\`.
- **One topic per file**: keep docs focused. Link to related docs rather than duplicating.
- **Dates**: include a \`Last updated:\` line at the top of docs that go stale (runbooks, processes, policies).
- **Ownership**: add an \`Owner:\` line to docs that have a clear DRI.

4. Merge to \`main\` when approved.

// ── Helpers ───────────────────────────────────────────────────────────────────

function getTitle(content) {
  const m = content.match(/^#\s+(.+)$/m);
  return m ? m[1] : 'Untitled';
}

function extractMeta(content) {
  const meta = {};
  content.split('\n').slice(0, 8).forEach(line => {
    const lu = line.match(/^Last updated:\s*(.+)$/i);
    const ow = line.match(/^Owner:\s*(.+)$/i);
    if (lu) meta.lastUpdated = lu[1].trim();
    if (ow) meta.owner = ow[1].trim();
  });
  return meta;
}

function stripMeta(content) {
  return content
    .replace(/^#[^\n]+\n/, '')               // remove h1
    .replace(/^Last updated:[^\n]*\n?/mi, '') // remove Last updated line
    .replace(/^Owner:[^\n]*\n?/mi, '')        // remove Owner line
    .replace(/^\n+/, '');                     // trim leading blank lines
}

function breadcrumbFor(page) {
  if (!page) return null;
  return page.split('/').slice(0, -1)
    .map(p => p.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase()))
    .join(' / ');
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderPage(page) {
  const content = PAGES[page];
  const area = document.getElementById('content-area');

  if (content === undefined) {
    area.innerHTML = `
      <div class="empty-state">
        <svg class="empty-state-icon" viewBox="0 0 48 48" fill="none">
          <rect x="8" y="6" width="32" height="38" rx="3" stroke="currentColor" stroke-width="2"/>
          <path d="M16 16h16M16 22h16M16 28h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <h2>Page Not Found</h2>
        <p>This document doesn't exist yet. Navigate using the sidebar or return home.</p>
      </div>`;
    return;
  }

  const title      = getTitle(content);
  const meta       = extractMeta(content);
  const body       = stripMeta(content);
  const breadcrumb = breadcrumbFor(page);

  const metaRowHTML = (meta.lastUpdated || meta.owner) ? `
    <div class="doc-meta-row">
      ${meta.lastUpdated ? `<div class="doc-meta-item"><span class="doc-meta-label">Last Updated</span><span class="doc-meta-value">${meta.lastUpdated}</span></div>` : ''}
      ${meta.owner       ? `<div class="doc-meta-item"><span class="doc-meta-label">Owner</span><span class="doc-meta-value">${meta.owner}</span></div>` : ''}
    </div>` : '';

  area.innerHTML = `
    <div class="doc-header">
      ${breadcrumb ? `<div class="doc-breadcrumb">${breadcrumb}</div>` : ''}
      <h1 class="doc-title">${title}</h1>
      ${metaRowHTML}
    </div>
    <article class="doc-body">${marked.parse(body)}</article>`;

  area.scrollTop = 0;
}

// ── Nav state ─────────────────────────────────────────────────────────────────

function setActive(page) {
  document.querySelectorAll('.nav-item, .nav-home').forEach(el => el.classList.remove('active'));
  if (page === '') {
    document.getElementById('nav-home').classList.add('active');
  } else {
    document.querySelectorAll('.nav-item[data-page]').forEach(el => {
      if (el.dataset.page === page) el.classList.add('active');
    });
  }
}

function toggleSection(id) {
  document.getElementById('section-' + id).classList.toggle('open');
}

// ── Navigation ────────────────────────────────────────────────────────────────

document.getElementById('sidebar-nav').addEventListener('click', function(e) {
  const item = e.target.closest('[data-page]');
  if (!item || item.classList.contains('empty')) return;
  const page = item.dataset.page;
  window.location.hash = '#/' + page;
  renderPage(page);
  setActive(page);
});

window.addEventListener('hashchange', () => {
  const page = window.location.hash.replace(/^#\/?/, '');
  renderPage(page);
  setActive(page);
  // Auto-expand the section that owns this page
  autoExpand(page);
});

function autoExpand(page) {
  if (page.startsWith('go-to-market')) document.getElementById('section-gtm').classList.add('open');
  if (page.startsWith('product'))      document.getElementById('section-product').classList.add('open');
  if (page.startsWith('engineering'))  document.getElementById('section-engineering').classList.add('open');
  if (page.startsWith('data'))         document.getElementById('section-data').classList.add('open');
  if (page.startsWith('operations'))   document.getElementById('section-operations').classList.add('open');
  if (page.startsWith('research'))     document.getElementById('section-research').classList.add('open');
}

// ── Init ──────────────────────────────────────────────────────────────────────
(function init() {
  const page = window.location.hash.replace(/^#\/?/, '');
  autoExpand(page);
  renderPage(page);
  setActive(page);
})();
</script>
